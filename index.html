<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>奚仲通</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --md-primary: #0061a4;
            --md-primary-con: #d1e4ff;
            --md-surface: #fdfcff;
            --md-surface-v: #dfe2eb;
            --m3-easing: cubic-bezier(0.05, 0.7, 0.1, 1);
        }

        body { font-family: 'Google Sans', sans-serif; background: #f7f9fc; margin: 0; padding: 0; overflow: hidden; color: #1a1c1e; }

        /* 基础框架 */
        .page-container { position: absolute; inset: 0; bottom: 84px; display: none; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
        .page-container.active { display: flex; animation: slideIn 0.4s var(--m3-easing); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* 认证屏幕 */
        .auth-screen { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; transition: 0.6s var(--m3-easing); }
        .auth-card { width: 100%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 12px; box-sizing: border-box; outline: none; font-size: 14px; }
        .btn-m3 { width: 100%; padding: 16px; border-radius: 30px; border: none; background: var(--md-primary); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }

        /* 发现页 AI 头部 */
        .header-ai { background: #1a1c1e; color: white; padding: 40px 24px 30px; border-radius: 0 0 32px 32px; }
        #ai-resp { font-size: 14px; color: #d1e4ff; line-height: 1.6; min-height: 40px; margin-bottom: 12px; }
        .ai-input-bar { background: rgba(255,255,255,0.1); border-radius: 16px; display: flex; padding: 4px 16px; align-items: center; }
        .ai-input-bar input { background: none; border: none; color: white; flex: 1; padding: 12px 0; outline: none; }

        /* 矩阵工具 */
        .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .matrix-card { background: white; border-radius: 24px; padding: 20px; display: flex; flex-direction: column; align-items: center; border: 1px solid #eee; text-align: center; cursor: pointer; }

        /* 社区组件 */
        .category-bar { display: flex; gap: 8px; overflow-x: auto; padding: 0 20px 15px; scrollbar-width: none; }
        .chip { padding: 8px 18px; border-radius: 20px; background: white; font-size: 12px; white-space: nowrap; border: 1px solid #eee; }
        .chip.active { background: var(--md-primary); color: white; border-color: var(--md-primary); }
        .post-card { background: white; margin: 0 16px 16px; border-radius: 20px; padding: 16px; border: 1px solid #eee; }
        .fab-post { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; border-radius: 18px; background: var(--md-primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 999; cursor: pointer; }

        /* 消息与详情 */
        .contact-header { padding: 24px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        #chat-view { position: fixed; inset: 0; background: #f0f2f5; z-index: 2500; display: none; flex-direction: column; }
        .bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
        .bubble.sent { align-self: flex-end; background: var(--md-primary); color: white; border-bottom-right-radius: 4px; }
        .bubble.recv { align-self: flex-start; background: white; border-bottom-left-radius: 4px; }

        /* 底部导航 */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 84px; background: white; display: flex; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; color: #74777f; }
        .nav-item.active { color: var(--md-primary); font-weight: bold; }
        .nav-text { font-size: 10px; margin-top: 4px; }

        #scan-box { display: none; width: 90%; margin: 10px auto; border-radius: 24px; overflow: hidden; background: #000; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-screen">
        <div class="auth-card" id="login-box">
            <h1 style="color:var(--md-primary);">登录</h1>
            <input type="text" id="login-u" placeholder="账户名">
            <input type="password" id="login-p" placeholder="密码">
            <button class="btn-m3" onclick="doLogin()">登录</button>
            <p style="font-size:13px; margin-top:20px; color:var(--md-primary);" onclick="toggleAuth(true)">注册账户</p>
        </div>
        <div class="auth-card" id="register-box" style="display:none;">
            <h1 style="color:var(--md-primary);">新用户注册</h1>
            <input type="text" id="reg-u" placeholder="账户名">
            <input type="password" id="reg-p" placeholder="密码">
            <button class="btn-m3" onclick="doRegister()">完成注册</button>
            <p style="font-size:13px; margin-top:20px; color:var(--md-primary);" onclick="toggleAuth(false)">返回登录</p>
        </div>
    </div>

    <div id="app" style="display:none;">
        
        <div id="page-home" class="page-container active">
            <div class="header-ai">
                <div id="ai-resp">你好，用户。奚仲通AI助手 已就绪。</div>
                <div class="ai-input-bar">
                    <input type="text" id="ai-q" placeholder="输入问题或指令...">
                    <button onclick="askAI()" style="background:none; border:none; color:white;">➤</button>
                </div>
            </div>
            <div id="scan-box"><div id="reader"></div></div>
            <div class="matrix-grid">
                <div class="matrix-card" onclick="startScan()"><span>📷</span><br><small>极速扫码</small></div>
                <div class="matrix-card" onclick="readNFC()"><span>🏷️</span><br><small>感应读取</small></div>
                <div class="matrix-card" onclick="toggleNFCWrite()"><span>✍️</span><br><small>标签写入</small></div>
                <div class="matrix-card" onclick="window.location.href='https://basic.smartedu.cn'"><span>🎓</span><br><small>智慧学习</small></div>
            </div>
            <div id="nfc-panel" style="display:none; padding:0 20px 20px;">
                <input type="url" id="nfc-t" value="https://">
                <button class="btn-m3" style="height:44px; font-size:13px;" onclick="writeNFC()">开始感应写入</button>
            </div>
        </div>

        <div id="page-community" class="page-container">
            <h1 style="padding:24px 20px 10px; margin:0;">社区</h1>
            <div class="category-bar">
                <div class="chip active">全部</div>
                <div class="chip">学习</div>
                <div class="chip">生活</div>
                <div class="chip">官方</div>
            </div>
            <div id="post-list">
                <div class="post-card">
                    <b>Yresr</b>: test1234567890。
                </div>
            </div>
            <div class="fab-post" onclick="createNewPost()">+</div>
        </div>

        <div id="page-chat" class="page-container">
            <div class="contact-header">
                <h1 style="margin:0;">消息</h1>
                <div style="font-size:24px; cursor:pointer;" onclick="addFriend()">+</div>
            </div>
            <div id="friend-list">
                <div class="post-card" onclick="openChat('Yresr')">Yresr</div>
                <div class="post-card" onclick="openChat('MZTN')">MZTN</div>
            </div>
            <div id="chat-view">
                <div style="height:64px; background:white; display:flex; align-items:center; padding:0 16px; border-bottom:1px solid #eee;">
                    <button onclick="closeChat()" style="background:none; border:none; font-size:24px;">←</button>
                    <b id="c-title" style="margin-left:12px;">用户名</b>
                </div>
                <div id="c-flow" style="flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:12px;"></div>
                <div style="padding:12px 16px; background:white; display:flex; gap:10px; border-top:1px solid #eee;">
                    <input type="text" id="c-input" placeholder="输入消息..." style="flex:1;">
                    <button onclick="sendMsg()" style="background:var(--md-primary); color:white; border:none; padding:0 20px; border-radius:20px;">发送</button>
                </div>
            </div>
        </div>

        <div id="page-user" class="page-container">
            <h1 style="padding:24px 20px 0; margin:0;">我的</h1>
            <div style="padding:20px;">
                <div style="background:white; padding:30px; border-radius:28px; text-align:center; border:1px solid #eee; margin-bottom:20px;">
                    <div style="font-size:40px;">👤</div>
                    <b id="user-display">奚仲通</b>
                </div>
                <button onclick="window.location.href='https://work.weixin.qq.com/kfid/kfc88c2e65dad02bf74'" style="width:100%; padding:16px; border-radius:30px; border:none; background:#07c160; color:white; font-weight:bold; margin-bottom:12px;">🎧 在线客服</button>
                <button onclick="window.location.href='https://xizhongtong.mysxl.cn'" style="width:100%; padding:16px; border-radius:30px; border:1px solid #ccc; background:white; color:var(--md-primary); font-weight:bold; margin-bottom:12px;">↩ 回滚至正式版</button>
                <button onclick="location.reload()" style="width:100%; padding:16px; border-radius:30px; border:none; background:none; color:red; font-weight:bold;">退出登录</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="navTo('page-home', this)"><div class="nav-text">发现</div></div>
            <div class="nav-item" onclick="navTo('page-community', this)"><div class="nav-text">社区</div></div>
            <div class="nav-item" onclick="navTo('page-chat', this)"><div class="nav-text">消息</div></div>
            <div class="nav-item" onclick="navTo('page-user', this)"><div class="nav-text">我的</div></div>
        </nav>
    </div>

    <script>
        const API_KEY = "sk-e57a555c8dce47e2865e89cfc584c464";

        function toggleAuth(isReg) {
            document.getElementById('login-box').style.display = isReg ? 'none' : 'block';
            document.getElementById('register-box').style.display = isReg ? 'block' : 'none';
        }

        function doRegister() {
            const u = document.getElementById('reg-u').value;
            const p = document.getElementById('reg-p').value;
            if(u && p) { localStorage.setItem('user_'+u, p); alert("注册成功"); toggleAuth(false); }
        }

        function doLogin() {
            const u = document.getElementById('login-u').value;
            const p = document.getElementById('login-p').value;
            if((u==='奚仲通' && p==='114514') || localStorage.getItem('user_'+u) === p) {
                document.getElementById('auth-screen').style.transform = 'translateY(-100%)';
                document.getElementById('app').style.display = 'block';
                document.getElementById('user-display').innerText = u;
            } else { alert("验证失败"); }
        }

        function navTo(id, el) {
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(html5QrCode) { html5QrCode.stop().catch(()=>{}); document.getElementById('scan-box').style.display='none'; }
        }

        function createNewPost() {
            const content = prompt("这一刻的想法...");
            if(content) {
                const list = document.getElementById('post-list');
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `<b>${document.getElementById('user-display').innerText}</b>: ${content}`;
                list.prepend(card);
            }
        }

        async function askAI() {
            const q = document.getElementById('ai-q').value;
            if(!q) return;
            document.getElementById('ai-resp').innerText = "思考中...";
            try {
                const r = await fetch("https://api.deepseek.com/chat/completions", {
                    method:"POST", headers:{"Content-Type":"application/json","Authorization":`Bearer ${API_KEY}`},
                    body: JSON.stringify({model:"deepseek-chat", messages:[{role:"user",content:q}]})
                });
                const d = await r.json();
                document.getElementById('ai-resp').innerText = d.choices[0].message.content;
            } catch(e) { document.getElementById('ai-resp').innerText = "连接异常"; }
        }

        let html5QrCode;
        function startScan() {
            document.getElementById('scan-box').style.display='block';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({facingMode:"environment"}, {fps:15, qrbox:250}, (txt)=>{
                html5QrCode.stop().then(()=>{ window.location.href=txt; });
            }).catch(e=>alert("无法开启相机"));
        }

        async function readNFC() {
            if(!('NDEFReader' in window)) return alert("不支持NFC");
            try {
                const n = new NDEFReader(); await n.scan(); alert("请贴合标签");
                n.onreading = e => { window.location.href = new TextDecoder().decode(e.message.records[0].data); };
            } catch(e) { alert("启动失败"); }
        }

        function toggleNFCWrite() {
            const p = document.getElementById('nfc-panel');
            p.style.display = p.style.display==='none'?'block':'none';
        }

        async function writeNFC() {
            const url = document.getElementById('nfc-t').value;
            try { const n = new NDEFReader(); await n.write(url); alert("已就绪"); } catch(e) { alert("写入失败"); }
        }

        function openChat(n){ document.getElementById('c-title').innerText=n; document.getElementById('chat-view').style.display='flex'; }
        function closeChat(){ document.getElementById('chat-view').style.display='none'; }
        function sendMsg(){
            const inp = document.getElementById('c-input');
            const flow = document.getElementById('c-flow');
            if(!inp.value) return;
            const b = document.createElement('div'); b.className="bubble sent"; b.innerText=inp.value;
            flow.appendChild(b); inp.value=""; flow.scrollTop=flow.scrollHeight;
        }

        function addFriend(){
            const n = prompt("输入对方账户名");
            if(n){
                const list = document.getElementById('friend-list');
                const card = document.createElement('div'); card.className='post-card';
                card.onclick = () => openChat(n); card.innerText = n;
                list.appendChild(card);
            }
        }
    </script>
</body>
</html>
