<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>xizhongtong奚仲通</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --md-primary: #0061a4;
            --md-primary-con: #d1e4ff;
            --md-surface: #fdfcff;
            --md-surface-v: #dfe2eb;
            --md-on-surface: #1a1c1e;
            --md-outline: #74777f;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--md-surface);
            color: var(--md-on-surface);
            margin: 0; padding: 0; overflow: hidden;
        }

        /* 登录遮罩层 */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--md-surface); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; box-sizing: border-box;
        }

        /* 页面容器 */
        .page-container {
            height: calc(100vh - 80px); display: none; padding: 20px;
            box-sizing: border-box; overflow-y: auto;
        }
        .page-container.active { display: block; animation: m3-fade 0.3s ease; }
        @keyframes m3-fade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        h1 { font-size: 24px; font-weight: 500; margin-bottom: 24px; }
        .card { background-color: var(--md-surface-v); padding: 20px; border-radius: 28px; margin-bottom: 16px; }

        input {
            width: 100%; background: white; border: 1px solid var(--md-outline);
            border-radius: 12px; padding: 16px; font-size: 16px; box-sizing: border-box; margin-bottom: 12px;
        }

        .btn {
            height: 54px; border-radius: 27px; border: none; font-size: 15px; font-weight: 500;
            width: 100%; cursor: pointer; background-color: var(--md-primary); color: white;
        }
        .btn-outline { background: transparent; border: 1px solid var(--md-outline); color: var(--md-primary); margin-top: 10px; }

        /* 底部导航 */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background-color: var(--md-surface-v); display: flex; align-items: center;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #43474e; }
        .nav-item.active { color: var(--md-primary); }
        .nav-label { width: 50px; height: 30px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; margin-bottom: 4px; }
        .nav-item.active .nav-label { background-color: var(--md-primary-con); }
        .nav-text { font-size: 11px; }

        #reader { width: 100%; border-radius: 20px; overflow: hidden; background: #000; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 32px;">欢迎回来</h1>
        <p style="margin-bottom: 30px; opacity: 0.7;">密码</p>
        <input type="text" id="userIn" placeholder="账户名">
        <input type="password" id="passIn" placeholder="密码">
        <button class="btn" onclick="handleLogin()">登录</button>
        <p style="font-size: 12px; margin-top: 20px; color: #999;">请登录测试账号</p>
    </div>

    <div id="page-home" class="page-container">
        <h1>发现</h1>
        <div class="card">
            <div id="reader"></div>
            <button class="btn" style="margin-top:12px;" onclick="startQrScan()">扫码跳转</button>
        </div>
        <div class="card" onclick="window.location.href='https://basic.smartedu.cn'" style="background: var(--md-primary-con); cursor:pointer;">
            <div style="font-weight: 500;">✨ 今天记得学习哦~</div>
            <div style="font-size: 12px; opacity: 0.8;">国家中小学智慧教育平台</div>
        </div>
    </div>

    <div id="page-chat" class="page-container">
        <h1>消息</h1>
        <div class="card" style="background:white; border-radius: 16px;">
            <div style="padding: 10px 0; border-bottom: 1px solid #eee;"><b>Yresr</b>: beta已更新至 1.0.10</div>
            <div style="padding: 10px 0;"><b>MZTN</b>: 别忘了测试校园卡哈哈。</div>
        </div>
    </div>

    <div id="page-nfc" class="page-container">
        <h1>校园卡工具</h1>
        <div class="card">
            <button class="btn" onclick="startNfcScan()">感应读取</button>
            <div style="margin: 20px 0; height: 1px; background: #ccc;"></div>
            <input type="url" id="urlInput" placeholder="https://" value="https://">
            <button class="btn btn-outline" onclick="startNfcWrite()">写入 内容 到标签</button>
        </div>
    </div>

    <div id="page-user" class="page-container">
        <h1>个人中心</h1>
        <div class="card" style="text-align: center; background: white;">
            <div style="width: 64px; height: 64px; background: var(--md-primary-con); border-radius: 32px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 24px;">👤</div>
            <div id="display-username" style="font-size: 20px; font-weight: 500;">-</div>
            <div style="font-size: 12px; color: #666; margin-top: 4px;">软件已激活（beta1.0.10）</div>
        </div>
        
        <div class="card">
            <div style="font-weight: 500; color: var(--md-primary);">关于团队</div>
            <p style="font-size: 13px;">开发: Yresr & MZTN</p>
            <button class="btn btn-outline" onclick="window.location.href='https://xizhongtong.mysxl.cn'">滚回正式版</button>
            <button class="btn btn-outline" style="border-color: #ffb4ab; color: #ba1a1a;" onclick="location.reload()">退出登录</button>
        </div>
    </div>

    <nav id="main-nav" class="bottom-nav" style="display:none;">
        <div class="nav-item active" onclick="switchPage('page-home', this)">
            <div class="nav-label">HOME</div><span class="nav-text">发现</span>
        </div>
        <div class="nav-item" onclick="switchPage('page-chat', this)">
            <div class="nav-label">CHAT</div><span class="nav-text">消息</span>
        </div>
        <div class="nav-item" onclick="switchPage('page-nfc', this)">
            <div class="nav-label">Card</div><span class="nav-text">工具</span>
        </div>
        <div class="nav-item" onclick="switchPage('page-user', this)">
            <div class="nav-label">USER</div><span class="nav-text">用户</span>
        </div>
    </nav>

    <script>
        // 登录逻辑
        function handleLogin() {
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;

            if (u === "奚仲通" && p === "114514") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                document.getElementById('page-home').classList.add('active');
                document.getElementById('display-username').innerText = u;
            } else {
                alert("账号或密码错误");
            }
        }

        // 页面切换
        function switchPage(pageId, navEl) {
            document.querySelectorAll('.page-container').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            navEl.classList.add('active');
            if (html5QrCode && pageId !== 'page-home') html5QrCode.stop().catch(() => {});
        }

        // 扫码跳转逻辑
        let html5QrCode;
        function startQrScan() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                html5QrCode.stop();
                if(text.startsWith('http')) window.location.replace(text);
            }).catch(() => alert("摄像头开启失败"));
        }

        // NFC 功能
        async function startNfcScan() {
            if (!('NDEFReader' in window)) return alert("您的设备不支持NFC");
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                alert("感应中...");
                ndef.onreading = (e) => {
                    const decoder = new TextDecoder();
                    for (const record of e.message.records) {
                        if (record.recordType === "url") window.location.replace(decoder.decode(record.data));
                    }
                };
            } catch (e) { alert("NFC启动失败"); }
        }

        async function startNfcWrite() {
            const url = document.getElementById('urlInput').value;
            try {
                const ndef = new NDEFReader();
                await ndef.write(url);
                alert("已就绪，请贴合标签");
            } catch (e) { alert("写入失败"); }
        }
    </script>
</body>
</html>
